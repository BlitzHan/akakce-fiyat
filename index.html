<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akakçe Fiyat Takibi</title>
<style>
  :root{
    --bg:#f4f5f7;--card:#fff;--ink:#16181d;--muted:#8a909a;--line:#ebedf1;--line2:#f3f4f7;
    --accent:#ff6a00;--accent-d:#e85d00;--accent-bg:#fff3ea;--green:#10864a;--green-bg:#eaf7ef;
    --shadow:0 1px 2px rgba(20,22,28,.04),0 6px 20px rgba(20,22,28,.05);
    --shadow-h:0 4px 12px rgba(20,22,28,.08),0 16px 40px rgba(20,22,28,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .tinner{max-width:880px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.3px}
  .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#ff9244);display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 2px 8px rgba(255,106,0,.35)}
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--muted)}
  .spacer{flex:1}.pill{font-size:12px;color:var(--muted);background:var(--line2);border:1px solid var(--line);padding:5px 10px;border-radius:999px;white-space:nowrap}
  .wrap{max-width:880px;margin:0 auto;padding:16px 18px 60px}
  .searchbox{position:relative;margin-bottom:12px}
  .searchbox svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .search{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:var(--card);outline:none;box-shadow:var(--shadow)}
  .search:focus{border-color:var(--accent)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
  .chip{font-size:13px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:999px;cursor:pointer;transition:all .14s;box-shadow:var(--shadow)}
  .chip:hover{color:var(--ink)}.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .c{opacity:.6;font-weight:500;margin-left:5px}
  .cat{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:22px 4px 10px}
  .model{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:11px;box-shadow:var(--shadow);overflow:hidden}
  .mhead{display:flex;align-items:center;gap:14px;padding:13px 16px 4px}
  .mimg{width:56px;height:56px;object-fit:contain;border-radius:10px;background:#fff;border:1px solid var(--line2);flex:none;padding:3px}
  .mtext{flex:1;min-width:0;display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .mname{font-size:16px;font-weight:800;letter-spacing:-.3px}
  .mbest{font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap}.mbest small{color:var(--muted);font-weight:500}
  .seg{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px 0}
  .vars{display:flex;gap:7px;flex-wrap:wrap;padding:6px 16px 4px}
  .var{flex:0 0 auto;min-width:74px;border:1.5px solid var(--line);border-radius:10px;background:#fff;padding:7px 12px;cursor:pointer;text-align:center;transition:all .14s}
  .var:hover{border-color:#cfd3da}.var .vl{font-size:13px;font-weight:700}.var .vp{font-size:11px;color:var(--muted);margin-top:1px}
  .var.on{border-color:var(--accent);background:var(--accent-bg)}.var.on .vp{color:var(--accent-d);font-weight:600}
  .cols{display:flex;gap:7px;flex-wrap:wrap;padding:4px 16px 6px}
  .col{flex:0 0 auto;border:1.5px solid var(--line);border-radius:10px;background:#fff;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .14s}
  .col:hover{border-color:#cfd3da}.col.on{border-color:var(--accent);background:var(--accent-bg)}
  .sw{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex:none}
  .col .cl{font-size:12.5px;font-weight:600}.col .cp{font-size:11px;color:var(--muted);font-weight:600}
  .col.on .cp{color:var(--accent-d)}.col.cheapest .cp{color:var(--green)}
  .vbody,.cbody{}
  .vpanel{display:none;border-top:1px solid var(--line);background:#fcfcfd;padding-bottom:6px}
  .vpanel.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 2px}
  .ph b{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.ph span{font-size:12px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--line2);padding:1px;margin:3px 13px 6px;border-radius:10px;overflow:hidden}
  .cell{background:var(--card);padding:10px 12px;text-decoration:none;display:block}
  .cell:hover{background:#fbfbfc}
  .cell .f{font-size:12px;color:var(--muted);line-height:16px;display:flex;align-items:center;gap:6px;overflow:hidden}
  .cell .p2{font-size:15px;font-weight:700;color:#33363c;line-height:21px;letter-spacing:-.2px}
  .cell.best{background:var(--green-bg)}.cell.best .p2{color:var(--green)}.cell.best .f::after{content:" · en ucuz";color:var(--green);font-weight:600}
  .flogo{width:17px;height:17px;border-radius:4px;object-fit:contain;flex:none;background:#fff}
  .fbadge{width:17px;height:17px;border-radius:4px;flex:none;display:inline-grid;place-items:center;color:#fff;font-size:10px;font-weight:800;line-height:1}
  .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .foot{padding:4px 16px 12px}.lnk{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}.lnk:hover{color:var(--accent-d)}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  .note{font-size:11.5px;color:var(--muted);margin-top:28px;line-height:1.6;text-align:center}
</style>
</head>

const num=s=>parseInt(String(s).replace(/[^\d]/g,''))||0;
const fmt=n=>n.toLocaleString('tr-TR')+" TL";
function colorFor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return PAL[h%PAL.length];}
function fbErr(img){const s=document.createElement('span');s.className='fbadge';s.style.background=img.dataset.c;s.textContent=img.dataset.i;img.replaceWith(s);}
function flogo(firm){const initial=(firm[0]||'?').toUpperCase();const color=colorFor(firm);const d=DOMAINS[firm];
  if(d)return `<img class="flogo" data-i="${initial}" data-c="${color}" src="https://www.google.com/s2/favicons?sz=64&domain=${d}" onerror="fbErr(this)">`;

function gridHTML(co,label){

}

function render(){

      const open=btn.classList.contains('on');
      vars.forEach(b=>b.classList.remove('on'));
      if(open){panel.classList.remove('open');panel.innerHTML='';return;}
      btn.classList.add('on');
      const v=m.variants[vi];
      if(v.colors.length===1 && v.colors[0].c===""){panel.innerHTML=gridHTML(v.colors[0],'');}
      else{
        const cheap=Math.min(...v.colors.map(c=>c._min));
        const cBtns=v.colors.map((co,ci)=>`<button class="col${co._min===cheap?' cheapest':''}" data-ci="${ci}"><span class="sw" style="background:${SW[co.c]||'#ccc'}"></span><span class="cl">${co.c}</span><span class="cp">${fmt(co._min)}</span></button>`).join('');
        panel.innerHTML=`<div class="seg">Renk</div><div class="cols">${cBtns}</div><div class="cbody"></div>`;
        const cols=[...panel.querySelectorAll('.col')];const cbody=panel.querySelector('.cbody');
        cols.forEach((cb,ci)=>{cb.onclick=()=>{const co=cols[ci].classList.contains('on');cols.forEach(x=>x.classList.remove('on'));if(co){cbody.innerHTML='';return;}cols[ci].classList.add('on');cbody.innerHTML=gridHTML(v.colors[ci],v.colors[ci].c);};});
        cols[0].click();
      }
      panel.classList.add('open');
    };});
    list.appendChild(card);
  });
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value;render();});
render();
</script>
</body>
