<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akakçe Fiyat Takibi</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --ink:#16181d; --muted:#8a909a;
    --line:#ebedf1; --line2:#f3f4f7;
    --accent:#ff6a00; --accent-d:#e85d00; --accent-bg:#fff3ea;
    --green:#10864a; --green-bg:#eaf7ef;
    --shadow:0 1px 2px rgba(20,22,28,.04),0 6px 20px rgba(20,22,28,.05);
    --shadow-h:0 4px 12px rgba(20,22,28,.08),0 16px 40px rgba(20,22,28,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4}

  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.88);
          backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .tinner{max-width:880px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.3px}
  .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#ff9244);
        display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 2px 8px rgba(255,106,0,.35)}
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--muted)}
  .spacer{flex:1}
  .pill{font-size:12px;color:var(--muted);background:var(--line2);border:1px solid var(--line);padding:5px 10px;border-radius:999px;white-space:nowrap}

  .wrap{max-width:880px;margin:0 auto;padding:16px 18px 60px}
  .searchbox{position:relative;margin-bottom:12px}
  .searchbox svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .search{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:12px;font-size:15px;
          background:var(--card);outline:none;box-shadow:var(--shadow)}
  .search:focus{border-color:var(--accent)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
  .chip{font-size:13px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);
        padding:6px 12px;border-radius:999px;cursor:pointer;transition:all .14s;box-shadow:var(--shadow)}
  .chip:hover{color:var(--ink)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .c{opacity:.6;font-weight:500;margin-left:5px}

  .cat{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:22px 4px 10px}

  .model{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:11px;
         box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .18s}
  .model:hover{box-shadow:var(--shadow-h)}
  .mhead{display:flex;align-items:center;gap:14px;padding:13px 16px 4px}
  .mimg{width:56px;height:56px;object-fit:contain;border-radius:10px;background:#fff;border:1px solid var(--line2);flex:none;padding:3px}
  .mtext{flex:1;min-width:0;display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .mname{font-size:16px;font-weight:800;letter-spacing:-.3px}
  .mbest{font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap}
  .mbest small{color:var(--muted);font-weight:500}
  .flogo{width:17px;height:17px;border-radius:4px;object-fit:contain;flex:none;background:#fff}
  .fbadge{width:17px;height:17px;border-radius:4px;flex:none;display:inline-grid;place-items:center;
          color:#fff;font-size:10px;font-weight:800;line-height:1}
  .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vars{display:flex;gap:8px;flex-wrap:wrap;padding:8px 17px 16px}
  .var{flex:0 0 auto;min-width:84px;border:1.5px solid var(--line);border-radius:11px;background:#fff;
       padding:9px 13px;cursor:pointer;text-align:center;transition:all .14s}
  .var:hover{border-color:#cfd3da}
  .var .vl{font-size:13.5px;font-weight:700;letter-spacing:-.2px}
  .var .vp{font-size:11.5px;color:var(--muted);margin-top:2px}
  .var.on{border-color:var(--accent);background:var(--accent-bg)}
  .var.on .vp{color:var(--accent-d);font-weight:600}

  .vpanel{display:none;border-top:1px solid var(--line);background:#fcfcfd}
  .vpanel.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:13px 17px 4px}
  .ph b{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .ph span{font-size:12px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--line2);
        padding:1px;margin:3px 13px 0;border-radius:10px;overflow:hidden}
  .cell{background:var(--card);padding:10px 12px;text-decoration:none;display:block;transition:background .1s}
  .cell:hover{background:#fbfbfc}
  .cell .f{font-size:12px;color:var(--muted);line-height:16px;display:flex;align-items:center;gap:6px;overflow:hidden}
  .cell .p2{font-size:15px;font-weight:700;color:#33363c;line-height:21px;letter-spacing:-.2px}
  .cell.best{background:var(--green-bg)}
  .cell.best .p2{color:var(--green)}
  .cell.best .f::after{content:" · en ucuz";color:var(--green);font-weight:600}
  .foot{padding:12px 17px 16px}
  .lnk{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}
  .lnk:hover{color:var(--accent-d)}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  .note{font-size:11.5px;color:var(--muted);margin-top:28px;line-height:1.6;text-align:center}
</style>
</head>

const num=s=>parseInt(String(s).replace(/[^\d]/g,''))||0;
const fmt=n=>n.toLocaleString('tr-TR')+" TL";
DATA.forEach(d=>{const p=d.name.split(' · ');d.base=p[0];d.variant=p.length>1?p.slice(1).join(' · '):'Fiyatlar';
  const s=[...d.firms].sort((a,b)=>num(a[1])-num(b[1]));d._s=s;d._min=num(s[0][1]);d._max=num(s[s.length-1][1]);});

const IMG={
 "iPhone 17":"https://cdn.akakce.com/z/apple/iphone-17-256-gb-siyah.jpg",
 "iPhone 17 Pro":"https://cdn.akakce.com/z/apple/iphone-17-pro.jpg",
 "iPhone 17 Pro Max":"https://cdn.akakce.com/z/apple/iphone-17-pro-max.jpg",
 "iPhone Air":"https://cdn.akakce.com/z/apple/iphone-air.jpg",
 "iPad Air M4 11\"":"https://cdn.akakce.com/z/apple/ipad-air-m4-wi-fi-128-gb-11.jpg",
 "iPad Air M4 13\"":"https://cdn.akakce.com/z/apple/ipad-air-m4-wi-fi-128-gb-13.jpg",
 "iPad 11. Nesil (A16)":"https://cdn.akakce.com/z/apple/ipad-11-nesil-wi-fi-128-gb-11.jpg",
 "AirPods Pro 3":"https://cdn.akakce.com/z/apple/airpods-pro-3-nesil.jpg",
 "AirPods 4":"https://cdn.akakce.com/z/apple/airpods-4-nesil.jpg",

 "Apple Watch Series 11":"https://cdn.akakce.com/z/apple/apple-watch-series-11.jpg",
 "Apple Watch SE 3":"https://cdn.akakce.com/z/apple/apple-watch-se-3.jpg",
 "Apple Watch Ultra 3":"https://cdn.akakce.com/z/apple/apple-watch-ultra-3-gps-cellular-49mm-siyah-titanyum-kasa.jpg"
};
const DOMAINS={
 "Migros Sanal Market Ekstra":"migros.com.tr","Şok Market":"sokmarket.com.tr","A101":"a101.com.tr",
 "Turkcell":"turkcell.com.tr","troy e-store":"troyestore.com","Arçelik":"arcelik.com.tr","Beko":"beko.com.tr",
 "MediaMarkt":"mediamarkt.com.tr","Teknosa":"teknosa.com","Vatan Bilgisayar":"vatanbilgisayar.com",
 "Avansas":"avansas.com","Beymen":"beymen.com","Apple Store":"apple.com","gurgencler.com.tr":"gurgencler.com.tr",
 "D&R":"dr.com.tr","Koçtaş":"koctas.com.tr","n11":"n11.com","idefix":"idefix.com","Hepsiburada":"hepsiburada.com",
 "Pazarama":"pazarama.com","Pttavm":"pttavm.com"
};
const PAL=["#e3001b","#ff6a00","#0a8a3d","#1565c0","#6a1b9a","#00838f","#c2185b","#5d4037","#455a64","#f9a825"];
function colorFor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return PAL[h%PAL.length];}
function fbErr(img){const s=document.createElement('span');s.className='fbadge';s.style.background=img.dataset.c;s.textContent=img.dataset.i;img.replaceWith(s);}
function flogo(firm){
  const initial=(firm[0]||'?').toUpperCase();const color=colorFor(firm);const d=DOMAINS[firm];
  if(d) return `<img class="flogo" data-i="${initial}" data-c="${color}" src="https://www.google.com/s2/favicons?sz=64&domain=${d}" onerror="fbErr(this)">`;
  return `<span class="fbadge" style="background:${color}">${initial}</span>`;
}

let activeCat="Tümü", query="";
document.getElementById('upd').textContent="Güncelleme · "+UPDATED;
const cats=[...new Set(DATA.map(d=>d.cat))];

const chipWrap=document.getElementById('chips');
[["Tümü",new Set(DATA.map(d=>d.cat+'|'+d.base)).size],...cats.map(c=>[c,new Set(DATA.filter(d=>d.cat===c).map(d=>d.base)).size])].forEach(([c,n])=>{
  const b=document.createElement('button');b.className='chip'+(c==="Tümü"?' on':'');
  b.innerHTML=c+'<span class="c">'+n+'</span>';b.dataset.cat=c;
  b.onclick=()=>{activeCat=c;[...chipWrap.children].forEach(x=>x.classList.toggle('on',x.dataset.cat===c));render();};
  chipWrap.appendChild(b);
});

function gridHTML(d){
  const cells=d._s.map((fr,i)=>`<a class="cell ${i===0?'best':''}" href="${d.url}" target="_blank" rel="noopener"><div class="f">${flogo(fr[0])}<span class="fn">${fr[0]}</span></div><div class="p2">${fr[1]}</div></a>`).join('');
  return `<div class="ph"><b>Piyasa fiyatları · ${d.variant}</b><span>${d.firms.length} satıcı</span></div>
    <div class="grid">${cells}</div>
    <div class="foot"><a class="lnk" href="${d.url}" target="_blank" rel="noopener">Akakçe'de tüm fiyatları gör →</a></div>`;
}

function render(){
  const list=document.getElementById('list');list.innerHTML="";
  const f=query.trim().toLowerCase();
  const items=DATA.filter(d=>(activeCat==="Tümü"||d.cat===activeCat) &&
    (d.base.toLowerCase().includes(f)||d.name.toLowerCase().includes(f)||d.firms.some(x=>x[0].toLowerCase().includes(f))));
  // group by cat>base preserving order
  const groups=[];const idx={};
  items.forEach(d=>{const k=d.cat+'|'+d.base;if(!(k in idx)){idx[k]=groups.length;groups.push({cat:d.cat,base:d.base,vars:[]});}groups[idx[k]].vars.push(d);});
  if(!groups.length){list.innerHTML='<div class="empty">Eşleşen ürün bulunamadı.</div>';return;}
  let lastCat=null;
  groups.forEach(g=>{
    if(g.cat!==lastCat){lastCat=g.cat;const h=document.createElement('div');h.className='cat';h.textContent=g.cat;list.appendChild(h);}
    const min=Math.min(...g.vars.map(v=>v._min));
    const card=document.createElement('div');card.className='model';
    const varBtns=g.vars.map((v,i)=>`<button class="var" data-i="${i}"><div class="vl">${v.variant}</div><div class="vp">${fmt(v._min)}</div></button>`).join('');
    card.innerHTML=`<div class="mhead">${IMG[g.base]?`<img class="mimg" src="${IMG[g.base]}" alt="" onerror="this.style.display='none'">`:''}<div class="mtext"><span class="mname">${g.base}</span><span class="mbest">en ucuz ${fmt(min)} <small>· ${g.vars.length} seçenek</small></span></div></div>
      <div class="vars">${varBtns}</div><div class="vpanel"></div>`;
    const panel=card.querySelector('.vpanel');
    const btns=[...card.querySelectorAll('.var')];
    btns.forEach((btn,i)=>{btn.onclick=()=>{
      const isOpen=btn.classList.contains('on');
      btns.forEach(b=>b.classList.remove('on'));
      if(isOpen){panel.classList.remove('open');panel.innerHTML='';return;}
      btn.classList.add('on');panel.innerHTML=gridHTML(g.vars[i]);panel.classList.add('open');
    };});
    list.appendChild(card);
  });
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value;render();});
render();
</script>
